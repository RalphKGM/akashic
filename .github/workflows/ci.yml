name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run check:syntax

      - run: npm test

  frontend-config:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node -e "JSON.parse(require('fs').readFileSync('frontend/app.json','utf8')); JSON.parse(require('fs').readFileSync('frontend/eas.json','utf8')); JSON.parse(require('fs').readFileSync('frontend/package.json','utf8')); console.log('frontend config ok')"
